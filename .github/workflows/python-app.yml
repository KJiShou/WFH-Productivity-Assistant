name: Work From Home Productivity Assistant

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: windows-latest

    strategy:
      matrix:
        python-version: [ 3.13, 3.11 ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies with uv
        run: |
          uv venv
          uv pip install -e .[dev]

      - name: Run linter
        run: uv pip install flake8 && uv run flake8 . --exclude .venv,__pypackages__,build,dist

      - name: Run tests
        run: uv pip install pytest && uv run pytest tests/
